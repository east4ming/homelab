elementweb:
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/target: "homelab-tunnel.127-0-0-1.ewhisper.cn"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hosts:
      - host: &frontend_host chat.127-0-0-1.ewhisper.cn
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: element-tls-certificate
        hosts:
          - *frontend_host
  config:
    default:
      base_url: https://matrix.127-0-0-1.ewhisper.cn
      server_name: 127-0-0-1.ewhisper.cn

dendrite:
  dendrite_config:
    global:
      server_name: matrix.127-0-0-1.ewhisper.cn
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hostName: matrix.127-0-0-1.ewhisper.cn
    tls:
      - hosts:
          - matrix.127-0-0-1.ewhisper.cn
        secretName: matrix-tls-certificate
  postgresql:
    enabled: true
